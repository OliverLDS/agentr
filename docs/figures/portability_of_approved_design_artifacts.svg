<svg xmlns="http://www.w3.org/2000/svg" width="1460" height="640" viewBox="0 0 1460 640" role="img" aria-labelledby="title desc">
  <title id="title">Portability of approved design artifacts</title>
  <desc id="desc">A conceptual diagram showing AgentSpec and approved workflow as outputs of agentr that can be handed off to prompts, coding agents, and implementations in different language or framework stacks, while portability is attributed to the design artifacts rather than the runtime.</desc>
  <style>
    .title { font: 600 28px "Helvetica Neue", Helvetica, Arial, sans-serif; fill: #222; }
    .label { font: 600 16px "Helvetica Neue", Helvetica, Arial, sans-serif; fill: #222; }
    .body { font: 400 14px "Helvetica Neue", Helvetica, Arial, sans-serif; fill: #333; }
    .small { font: 400 12px "Helvetica Neue", Helvetica, Arial, sans-serif; fill: #444; }
    .frame { fill: none; stroke: #a0a0a0; stroke-width: 1.5; rx: 16; ry: 16; }
    .env { fill: #eaf4ee; stroke: #3f7559; stroke-width: 2; rx: 12; ry: 12; }
    .artifact { fill: #fbf4df; stroke: #a78622; stroke-width: 2; rx: 12; ry: 12; }
    .prompt { fill: #edf3fb; stroke: #4a6ea9; stroke-width: 2; rx: 12; ry: 12; }
    .impl { fill: #f7f7f7; stroke: #8b8b8b; stroke-width: 1.8; rx: 12; ry: 12; }
    .note { fill: #fff; stroke: #999; stroke-width: 1.4; stroke-dasharray: 6 4; rx: 10; ry: 10; }
    .arrow { stroke: #666; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    .soft { stroke: #888; stroke-width: 1.6; fill: none; stroke-dasharray: 6 4; marker-end: url(#arrowSoft); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#666"/>
    </marker>
    <marker id="arrowSoft" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#888"/>
    </marker>
  </defs>

  <text x="730" y="40" text-anchor="middle" class="title">Portability of approved design artifacts</text>

  <rect x="60" y="100" width="320" height="300" class="frame"/>
  <text x="90" y="132" class="label">agentr</text>

  <rect x="120" y="170" width="200" height="58" class="env"/>
  <text x="220" y="205" text-anchor="middle" class="label">Scaffolder</text>

  <rect x="105" y="270" width="230" height="58" class="artifact"/>
  <text x="220" y="294" text-anchor="middle" class="label">Approved AgentSpec</text>
  <text x="220" y="314" text-anchor="middle" class="small">portable design artifact</text>

  <rect x="105" y="340" width="230" height="58" class="artifact"/>
  <text x="220" y="364" text-anchor="middle" class="label">Approved workflow</text>
  <text x="220" y="384" text-anchor="middle" class="small">portable design artifact</text>

  <path d="M 220 228 L 220 270" class="arrow"/>
  <path d="M 220 228 L 220 340" class="arrow"/>

  <rect x="480" y="120" width="220" height="62" class="prompt"/>
  <text x="590" y="145" text-anchor="middle" class="label">Implementation prompts</text>
  <text x="590" y="165" text-anchor="middle" class="small">design-to-code handoff</text>

  <rect x="480" y="235" width="220" height="62" class="prompt"/>
  <text x="590" y="260" text-anchor="middle" class="label">Coding agents</text>
  <text x="590" y="280" text-anchor="middle" class="small">implementation planning or generation</text>

  <rect x="830" y="100" width="220" height="62" class="impl"/>
  <text x="940" y="135" text-anchor="middle" class="label">R implementation</text>

  <rect x="830" y="210" width="220" height="62" class="impl"/>
  <text x="940" y="245" text-anchor="middle" class="label">Python implementation</text>

  <rect x="830" y="320" width="260" height="62" class="impl"/>
  <text x="960" y="345" text-anchor="middle" class="label">JS or orchestration stack</text>
  <text x="960" y="365" text-anchor="middle" class="small">stack-specific runtime realization</text>

  <rect x="1110" y="470" width="270" height="80" class="note"/>
  <text x="1245" y="500" text-anchor="middle" class="label">Portability claim</text>
  <text x="1245" y="523" text-anchor="middle" class="body">What travels across stacks is the</text>
  <text x="1245" y="545" text-anchor="middle" class="body">approved design artifact, not the runtime.</text>

  <path d="M 335 299 L 480 151" class="arrow"/>
  <path d="M 335 369 L 480 151" class="arrow"/>
  <path d="M 335 299 L 480 266" class="arrow"/>
  <path d="M 335 369 L 480 266" class="arrow"/>

  <path d="M 700 151 L 830 131" class="arrow"/>
  <path d="M 700 151 L 830 241" class="arrow"/>
  <path d="M 700 266 L 830 351" class="arrow"/>

  <path d="M 1245 470 L 960 382" class="soft"/>
  <path d="M 1110 500 L 335 299" class="soft"/>
</svg>
