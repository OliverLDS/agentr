<svg xmlns="http://www.w3.org/2000/svg" width="1480" height="860" viewBox="0 0 1480 860" role="img" aria-labelledby="title desc">
  <title id="title">Workflow and agent-design proposal lifecycle</title>
  <desc id="desc">A lifecycle diagram showing elicitation, workflow proposal states, linked agent-spec proposal states, approval, supersession, rejection, and the rule that the live workflow remains unchanged until approval.</desc>
  <style>
    .title { font: 600 28px "Helvetica Neue", Helvetica, Arial, sans-serif; fill: #222; }
    .section { font: 600 20px "Helvetica Neue", Helvetica, Arial, sans-serif; fill: #222; }
    .label { font: 600 16px "Helvetica Neue", Helvetica, Arial, sans-serif; fill: #222; }
    .body { font: 400 15px "Helvetica Neue", Helvetica, Arial, sans-serif; fill: #333; }
    .small { font: 400 13px "Helvetica Neue", Helvetica, Arial, sans-serif; fill: #444; }
    .frame { fill: none; stroke: #a0a0a0; stroke-width: 1.5; rx: 16; ry: 16; }
    .elicitation { fill: #edf3fb; stroke: #4a6ea9; stroke-width: 2; rx: 12; ry: 12; }
    .workflow { fill: #fbf4df; stroke: #a78622; stroke-width: 2; rx: 12; ry: 12; }
    .agent { fill: #eaf4ee; stroke: #3f7559; stroke-width: 2; rx: 12; ry: 12; }
    .terminal { fill: #f8e8e8; stroke: #b25b5b; stroke-width: 2; rx: 12; ry: 12; }
    .approved { fill: #e7f1ea; stroke: #3b8459; stroke-width: 2.4; rx: 12; ry: 12; }
    .live { fill: #eef2f7; stroke: #64748b; stroke-width: 2.4; rx: 14; ry: 14; }
    .note { fill: #fff; stroke: #999; stroke-width: 1.4; stroke-dasharray: 6 4; rx: 10; ry: 10; }
    .arrow { stroke: #555; stroke-width: 2.1; fill: none; marker-end: url(#arrow); }
    .soft { stroke: #777; stroke-width: 1.8; fill: none; stroke-dasharray: 6 4; marker-end: url(#arrowSoft); }
    .link { stroke: #5f7d6a; stroke-width: 1.8; fill: none; stroke-dasharray: 5 4; marker-end: url(#arrowGreen); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#555"/>
    </marker>
    <marker id="arrowSoft" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#777"/>
    </marker>
    <marker id="arrowGreen" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#5f7d6a"/>
    </marker>
  </defs>

  <text x="740" y="42" text-anchor="middle" class="title">Workflow and agent-design proposal lifecycle</text>

  <rect x="50" y="95" width="240" height="90" class="elicitation"/>
  <text x="170" y="130" text-anchor="middle" class="section">Elicitation</text>
  <text x="170" y="158" text-anchor="middle" class="body">evaluate, decompose,</text>
  <text x="170" y="180" text-anchor="middle" class="body">recommend, discuss</text>

  <rect x="1080" y="95" width="320" height="105" class="live"/>
  <text x="1240" y="130" text-anchor="middle" class="section">Live approved state</text>
  <text x="1240" y="158" text-anchor="middle" class="body">live workflow and approved design</text>
  <text x="1240" y="180" text-anchor="middle" class="body">remain unchanged until approval</text>

  <rect x="330" y="95" width="470" height="300" class="frame"/>
  <text x="360" y="126" class="section">Workflow proposal lifecycle</text>
  <rect x="370" y="165" width="170" height="60" class="workflow"/>
  <text x="455" y="190" text-anchor="middle" class="label">Preview / proposal</text>
  <text x="455" y="212" text-anchor="middle" class="small">pending</text>
  <rect x="590" y="165" width="170" height="60" class="workflow"/>
  <text x="675" y="190" text-anchor="middle" class="label">Under discussion</text>
  <text x="675" y="212" text-anchor="middle" class="small">under_discussion</text>
  <rect x="430" y="285" width="150" height="60" class="approved"/>
  <text x="505" y="310" text-anchor="middle" class="label">Approved</text>
  <text x="505" y="332" text-anchor="middle" class="small">approved</text>
  <rect x="610" y="285" width="150" height="60" class="terminal"/>
  <text x="685" y="310" text-anchor="middle" class="label">Rejected</text>
  <text x="685" y="332" text-anchor="middle" class="small">rejected</text>
  <rect x="520" y="355" width="150" height="60" class="terminal"/>
  <text x="595" y="380" text-anchor="middle" class="label">Superseded</text>
  <text x="595" y="402" text-anchor="middle" class="small">superseded</text>

  <rect x="330" y="455" width="470" height="300" class="frame"/>
  <text x="360" y="486" class="section">Agent-spec proposal lifecycle</text>
  <rect x="370" y="525" width="170" height="60" class="agent"/>
  <text x="455" y="550" text-anchor="middle" class="label">Draft proposal</text>
  <text x="455" y="572" text-anchor="middle" class="small">draft</text>
  <rect x="590" y="525" width="170" height="60" class="agent"/>
  <text x="675" y="550" text-anchor="middle" class="label">Under discussion</text>
  <text x="675" y="572" text-anchor="middle" class="small">under_discussion</text>
  <rect x="430" y="645" width="150" height="60" class="approved"/>
  <text x="505" y="670" text-anchor="middle" class="label">Approved</text>
  <text x="505" y="692" text-anchor="middle" class="small">approved</text>
  <rect x="610" y="645" width="150" height="60" class="terminal"/>
  <text x="685" y="670" text-anchor="middle" class="label">Rejected</text>
  <text x="685" y="692" text-anchor="middle" class="small">rejected</text>
  <rect x="520" y="715" width="150" height="60" class="terminal"/>
  <text x="595" y="740" text-anchor="middle" class="label">Superseded</text>
  <text x="595" y="762" text-anchor="middle" class="small">superseded</text>

  <rect x="910" y="320" width="450" height="190" class="note"/>
  <text x="935" y="355" class="section">Rule</text>
  <text x="935" y="390" class="body">The live workflow and the live approved design</text>
  <text x="935" y="415" class="body">remain unchanged while proposals are previewed,</text>
  <text x="935" y="440" class="body">discussed, rejected, or superseded.</text>
  <text x="935" y="470" class="body">Only approval promotes proposal state into live state.</text>

  <path d="M 290 140 L 370 195" class="arrow"/>
  <path d="M 290 150 L 370 555" class="arrow"/>

  <path d="M 540 195 L 590 195" class="arrow"/>
  <path d="M 455 225 L 505 285" class="arrow"/>
  <path d="M 675 225 L 505 285" class="arrow"/>
  <path d="M 675 225 L 685 285" class="arrow"/>
  <path d="M 505 345 L 595 355" class="arrow"/>

  <path d="M 540 555 L 590 555" class="arrow"/>
  <path d="M 455 585 L 505 645" class="arrow"/>
  <path d="M 675 585 L 505 645" class="arrow"/>
  <path d="M 675 585 L 685 645" class="arrow"/>
  <path d="M 505 705 L 595 715" class="arrow"/>

  <path d="M 540 195 C 590 235, 590 500, 540 555" class="link"/>
  <text x="610" y="472" class="small">linked workflow_proposal_id</text>

  <path d="M 580 315 L 1080 170" class="arrow"/>
  <path d="M 760 315 L 1080 170" class="soft"/>
  <path d="M 670 385 L 1080 170" class="soft"/>

  <path d="M 580 675 L 1080 170" class="arrow"/>
  <path d="M 760 675 L 1080 170" class="soft"/>
  <path d="M 670 745 L 1080 170" class="soft"/>
</svg>
