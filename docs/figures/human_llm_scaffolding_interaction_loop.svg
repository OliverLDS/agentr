<svg xmlns="http://www.w3.org/2000/svg" width="1560" height="760" viewBox="0 0 1560 760" role="img" aria-labelledby="title desc">
  <title id="title">Human–LLM scaffolding interaction loop</title>
  <desc id="desc">An audit-oriented interaction loop showing build_scaffolder_prompt, model JSON response, validation, apply_scaffolder_message, updated workflow and proposals, human prompts, and the next round, including human feedback methods.</desc>
  <style>
    .title { font: 600 28px "Helvetica Neue", Helvetica, Arial, sans-serif; fill: #222; }
    .label { font: 600 16px "Helvetica Neue", Helvetica, Arial, sans-serif; fill: #222; }
    .body { font: 400 14px "Helvetica Neue", Helvetica, Arial, sans-serif; fill: #333; }
    .small { font: 400 12px "Helvetica Neue", Helvetica, Arial, sans-serif; fill: #444; }
    .human { fill: #f7f1e8; stroke: #9a6735; stroke-width: 1.8; rx: 12; ry: 12; }
    .prompt { fill: #edf3fb; stroke: #4a6ea9; stroke-width: 1.8; rx: 12; ry: 12; }
    .model { fill: #f6edf8; stroke: #8c5fa8; stroke-width: 1.8; rx: 12; ry: 12; }
    .control { fill: #eaf4ee; stroke: #3f7559; stroke-width: 1.8; rx: 12; ry: 12; }
    .artifact { fill: #fbf4df; stroke: #a78622; stroke-width: 1.8; rx: 12; ry: 12; }
    .guard { fill: #f8e8e8; stroke: #b25b5b; stroke-width: 1.8; rx: 12; ry: 12; }
    .arrow { stroke: #666; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    .soft { stroke: #777; stroke-width: 1.6; fill: none; stroke-dasharray: 6 4; marker-end: url(#arrowSoft); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#666"/>
    </marker>
    <marker id="arrowSoft" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#777"/>
    </marker>
  </defs>

  <text x="780" y="40" text-anchor="middle" class="title">Human–LLM scaffolding interaction loop</text>

  <rect x="60" y="150" width="150" height="60" class="human"/>
  <text x="135" y="186" text-anchor="middle" class="label">Human reviewer</text>

  <rect x="260" y="150" width="180" height="60" class="prompt"/>
  <text x="350" y="186" text-anchor="middle" class="label">build_scaffolder_prompt</text>

  <rect x="490" y="150" width="140" height="60" class="model"/>
  <text x="560" y="186" text-anchor="middle" class="label">Reasoning model</text>

  <rect x="680" y="140" width="170" height="80" class="model"/>
  <text x="765" y="172" text-anchor="middle" class="label">Model JSON response</text>
  <text x="765" y="194" text-anchor="middle" class="small">actions only</text>

  <rect x="900" y="125" width="220" height="110" class="control"/>
  <text x="1010" y="158" text-anchor="middle" class="label">Validation</text>
  <text x="1010" y="182" text-anchor="middle" class="small">allowed methods</text>
  <text x="1010" y="200" text-anchor="middle" class="small">argument checks</text>
  <text x="1010" y="218" text-anchor="middle" class="small">reference checks</text>

  <rect x="1170" y="150" width="210" height="60" class="control"/>
  <text x="1275" y="186" text-anchor="middle" class="label">apply_scaffolder_message</text>

  <rect x="1230" y="310" width="230" height="70" class="artifact"/>
  <text x="1345" y="340" text-anchor="middle" class="label">Updated workflow and proposals</text>
  <text x="1345" y="362" text-anchor="middle" class="small">normalized dispatch result</text>

  <rect x="950" y="470" width="180" height="60" class="prompt"/>
  <text x="1040" y="506" text-anchor="middle" class="label">Next round prompt build</text>

  <rect x="910" y="310" width="220" height="70" class="artifact"/>
  <text x="1020" y="340" text-anchor="middle" class="label">Human prompts</text>
  <text x="1020" y="362" text-anchor="middle" class="small">questions or requested edits</text>

  <rect x="560" y="470" width="150" height="60" class="human"/>
  <text x="635" y="494" text-anchor="middle" class="label">ask_human_rule</text>
  <text x="635" y="514" text-anchor="middle" class="small">capture rule</text>

  <rect x="740" y="470" width="170" height="60" class="human"/>
  <text x="825" y="494" text-anchor="middle" class="label">ask_human_changes</text>
  <text x="825" y="514" text-anchor="middle" class="small">capture edits</text>

  <rect x="670" y="610" width="180" height="60" class="human"/>
  <text x="760" y="636" text-anchor="middle" class="label">apply_human_feedback</text>
  <text x="760" y="656" text-anchor="middle" class="small">state update</text>

  <rect x="1140" y="450" width="250" height="90" class="guard"/>
  <text x="1265" y="482" text-anchor="middle" class="label">Constrained and auditable</text>
  <text x="1265" y="504" text-anchor="middle" class="small">actions only</text>
  <text x="1265" y="522" text-anchor="middle" class="small">sequential semantics</text>

  <path d="M 210 180 L 260 180" class="arrow"/>
  <path d="M 440 180 L 490 180" class="arrow"/>
  <path d="M 630 180 L 680 180" class="arrow"/>
  <path d="M 850 180 L 900 180" class="arrow"/>
  <path d="M 1120 180 L 1170 180" class="arrow"/>
  <path d="M 1275 210 L 1335 310" class="arrow"/>
  <path d="M 1230 345 L 1130 345" class="arrow"/>
  <path d="M 1020 380 L 825 470" class="arrow"/>
  <path d="M 1020 380 L 635 470" class="arrow"/>
  <path d="M 635 530 L 735 610" class="arrow"/>
  <path d="M 825 530 L 785 610" class="arrow"/>
  <path d="M 850 640 L 1230 345" class="arrow"/>
  <path d="M 1265 450 L 1275 210" class="soft"/>
  <path d="M 1230 345 C 1250 430, 1120 470, 1040 470" class="arrow"/>
  <path d="M 950 500 C 700 560, 350 420, 350 210" class="soft"/>
</svg>
