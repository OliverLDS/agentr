<svg xmlns="http://www.w3.org/2000/svg" width="1540" height="760" viewBox="0 0 1540 760" role="img" aria-labelledby="title desc">
  <title id="title">Before and after workflow refinement</title>
  <desc id="desc">A two-panel DAG-style figure comparing an initial coarse economic-analysis workflow with a refined workflow that surfaces chart-selection rules, review gates, and publication checks.</desc>
  <style>
    .title { font: 600 28px "Helvetica Neue", Helvetica, Arial, sans-serif; fill: #222; }
    .panel { fill: none; stroke: #a7a7a7; stroke-width: 1.5; rx: 16; ry: 16; }
    .panelTitle { font: 600 20px "Helvetica Neue", Helvetica, Arial, sans-serif; fill: #222; }
    .label { font: 600 15px "Helvetica Neue", Helvetica, Arial, sans-serif; fill: #222; }
    .small { font: 400 12px "Helvetica Neue", Helvetica, Arial, sans-serif; fill: #444; }
    .body { font: 400 14px "Helvetica Neue", Helvetica, Arial, sans-serif; fill: #333; }
    .coarse { fill: #f7f5f0; stroke: #666; stroke-width: 1.6; rx: 12; ry: 12; }
    .analysis { fill: #eef4fb; stroke: #4a6ea9; stroke-width: 1.7; rx: 12; ry: 12; }
    .rule { fill: #fbf4df; stroke: #a78622; stroke-width: 1.7; rx: 12; ry: 12; }
    .gate { fill: #f8e8e8; stroke: #b25b5b; stroke-width: 1.9; rx: 12; ry: 12; }
    .approved { fill: #e7f1ea; stroke: #3b8459; stroke-width: 1.9; rx: 12; ry: 12; }
    .note { fill: #fff; stroke: #999; stroke-width: 1.2; stroke-dasharray: 5 4; rx: 10; ry: 10; }
    .edge { stroke: #666; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    .edgeSoft { stroke: #888; stroke-width: 1.7; fill: none; stroke-dasharray: 6 4; marker-end: url(#arrowSoft); }
    .annot { stroke: #999; stroke-width: 1.2; fill: none; stroke-dasharray: 5 4; }
  </style>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#666"/>
    </marker>
    <marker id="arrowSoft" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#888"/>
    </marker>
  </defs>

  <text x="770" y="40" text-anchor="middle" class="title">Before and after workflow refinement</text>

  <rect x="40" y="80" width="620" height="620" class="panel"/>
  <text x="70" y="112" class="panelTitle">Before refinement</text>

  <rect x="90" y="170" width="150" height="54" class="coarse"/>
  <text x="165" y="202" text-anchor="middle" class="label">Collect market data</text>

  <rect x="290" y="170" width="140" height="54" class="coarse"/>
  <text x="360" y="202" text-anchor="middle" class="label">Analyze economy</text>

  <rect x="470" y="170" width="130" height="54" class="coarse"/>
  <text x="535" y="202" text-anchor="middle" class="label">Create charts</text>

  <rect x="190" y="310" width="140" height="54" class="coarse"/>
  <text x="260" y="342" text-anchor="middle" class="label">Write report</text>

  <rect x="390" y="310" width="150" height="54" class="coarse"/>
  <text x="465" y="342" text-anchor="middle" class="label">Publish report</text>

  <path d="M 240 197 L 290 197" class="edge"/>
  <path d="M 430 197 L 470 197" class="edge"/>
  <path d="M 535 224 C 535 265, 320 275, 280 310" class="edge"/>
  <path d="M 330 337 L 390 337" class="edge"/>

  <rect x="95" y="470" width="500" height="120" class="note"/>
  <text x="120" y="503" class="body">Tacit knowledge remains implicit:</text>
  <text x="120" y="530" class="body">which chart type fits the claim, what requires human review,</text>
  <text x="120" y="557" class="body">and which publication rules should block or permit release.</text>
  <path d="M 535 224 C 600 260, 615 430, 520 470" class="annot"/>

  <rect x="700" y="80" width="800" height="620" class="panel"/>
  <text x="730" y="112" class="panelTitle">After refinement</text>

  <rect x="740" y="160" width="160" height="54" class="analysis"/>
  <text x="820" y="192" text-anchor="middle" class="label">Collect market data</text>

  <rect x="950" y="160" width="180" height="54" class="analysis"/>
  <text x="1040" y="184" text-anchor="middle" class="label">Validate indicators</text>
  <text x="1040" y="202" text-anchor="middle" class="small">and assumptions</text>

  <rect x="1180" y="160" width="150" height="54" class="analysis"/>
  <text x="1255" y="192" text-anchor="middle" class="label">Analyze economy</text>

  <rect x="760" y="290" width="170" height="62" class="rule"/>
  <text x="845" y="316" text-anchor="middle" class="label">Select chart type</text>
  <text x="845" y="336" text-anchor="middle" class="small">by communicative goal</text>

  <rect x="980" y="290" width="170" height="62" class="rule"/>
  <text x="1065" y="316" text-anchor="middle" class="label">Apply charting rules</text>
  <text x="1065" y="336" text-anchor="middle" class="small">clarity, scale, comparability</text>

  <rect x="1200" y="290" width="130" height="62" class="analysis"/>
  <text x="1265" y="326" text-anchor="middle" class="label">Draft charts</text>

  <rect x="1030" y="420" width="170" height="62" class="gate"/>
  <text x="1115" y="446" text-anchor="middle" class="label">Human review gate</text>
  <text x="1115" y="466" text-anchor="middle" class="small">approval required</text>

  <rect x="760" y="420" width="170" height="62" class="analysis"/>
  <text x="845" y="446" text-anchor="middle" class="label">Revise analysis</text>
  <text x="845" y="466" text-anchor="middle" class="small">or charts</text>

  <rect x="1240" y="420" width="140" height="62" class="analysis"/>
  <text x="1310" y="456" text-anchor="middle" class="label">Write report</text>

  <rect x="1160" y="550" width="170" height="62" class="rule"/>
  <text x="1245" y="576" text-anchor="middle" class="label">Publication rule check</text>
  <text x="1245" y="596" text-anchor="middle" class="small">release constraints</text>

  <rect x="1360" y="550" width="110" height="62" class="approved"/>
  <text x="1415" y="586" text-anchor="middle" class="label">Publish</text>

  <path d="M 900 187 L 950 187" class="edge"/>
  <path d="M 1130 187 L 1180 187" class="edge"/>
  <path d="M 1255 214 C 1255 252, 930 252, 880 290" class="edge"/>
  <path d="M 930 321 L 980 321" class="edge"/>
  <path d="M 1150 321 L 1200 321" class="edge"/>
  <path d="M 1265 352 L 1140 420" class="edge"/>
  <path d="M 1030 451 L 930 451" class="edgeSoft"/>
  <path d="M 845 420 C 845 365, 1180 250, 1255 214" class="edgeSoft"/>
  <path d="M 1200 451 L 1240 451" class="edge"/>
  <path d="M 1310 482 L 1260 550" class="edge"/>
  <path d="M 1330 581 L 1360 581" class="edge"/>

  <rect x="730" y="640" width="220" height="70" class="note"/>
  <text x="750" y="668" class="body">Tacit knowledge surfaced:</text>
  <text x="750" y="692" class="small">chart type depends on claim, audience,</text>
  <text x="750" y="708" class="small">and comparison logic</text>
  <path d="M 845 352 C 820 420, 800 575, 820 640" class="annot"/>

  <rect x="980" y="640" width="220" height="70" class="note"/>
  <text x="1000" y="668" class="body">Tacit knowledge surfaced:</text>
  <text x="1000" y="692" class="small">review is an explicit human gate,</text>
  <text x="1000" y="708" class="small">not an implied step</text>
  <path d="M 1115 482 C 1115 545, 1105 590, 1095 640" class="annot"/>

  <rect x="1230" y="640" width="230" height="70" class="note"/>
  <text x="1250" y="668" class="body">Tacit knowledge surfaced:</text>
  <text x="1250" y="692" class="small">publication depends on explicit</text>
  <text x="1250" y="708" class="small">rule checks before release</text>
  <path d="M 1245 612 C 1245 625, 1245 632, 1245 640" class="annot"/>
</svg>
